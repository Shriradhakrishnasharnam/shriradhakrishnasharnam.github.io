<style>

:root{

--primary:#0b1220;

--secondary:#102542;

--glass:rgba(255,255,255,.08);

--border:rgba(255,255,255,.15);

--gold:#f7d774;

--blue:#3da5ff;

--cyan:#00f0ff;

--purple:#8d6cff;

--text:#ffffff;

--muted:#d9d9d9;

--shadow:0 15px 45px rgba(0,0,0,.35);

--radius:22px;

}

*{

margin:0;

padding:0;

box-sizing:border-box;

scroll-behavior:smooth;

}

html{

overflow-x:hidden;

}

body{

background:#050b16;

color:white;

font-family:"Times New Roman",Georgia,serif;

overflow-x:hidden;

line-height:1.8;

}

/* Animated Aurora */

body::before{

content:"";

position:fixed;

inset:-20%;

background:

radial-gradient(circle at 20% 30%,#4f46e5 0%,transparent 30%),

radial-gradient(circle at 80% 20%,#06b6d4 0%,transparent 30%),

radial-gradient(circle at 70% 80%,#9333ea 0%,transparent 35%),

radial-gradient(circle at 10% 90%,#2563eb 0%,transparent 30%);

filter:blur(90px);

animation:aurora 20s linear infinite alternate;

z-index:-5;

}

@keyframes aurora{

0%{

transform:translateX(-5%) translateY(-5%) rotate(0deg);

}

100%{

transform:translateX(6%) translateY(8%) rotate(15deg);

}

}

/* Stars */

#stars{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

pointer-events:none;

z-index:-4;

overflow:hidden;

}

.star{

position:absolute;

background:white;

border-radius:50%;

opacity:.8;

animation:twinkle 4s infinite;

}

@keyframes twinkle{

50%{

opacity:.2;

transform:scale(.4);

}

100%{

opacity:.8;

}

}

section{

padding:110px 10%;

position:relative;

}

.container{

max-width:1400px;

margin:auto;

}

h1,h2,h3{

font-family:"Cinzel","Times New Roman",serif;

font-weight:700;

}

.subtitle{

font-family:"Cormorant Garamond",Georgia,serif;

font-size:1.5rem;

font-style:italic;

color:var(--gold);

}

.glass{

background:var(--glass);

backdrop-filter:blur(20px);

border:1px solid var(--border);

box-shadow:var(--shadow);

border-radius:var(--radius);

}

</style>

<script>

/* Generate Stars */

const stars=document.getElementById('stars');

for(let i=0;i<220;i++){

const s=document.createElement('span');

s.className='star';

const size=Math.random()*3+1;

s.style.width=size+'px';

s.style.height=size+'px';

s.style.left=Math.random()*100+'%';

s.style.top=Math.random()*100+'%';

s.style.animationDelay=Math.random()*5+'s';

stars.appendChild(s);

}

</script>
